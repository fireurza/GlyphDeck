name: Bug Report
description: Report a bug in GlyphDeck
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the information below.
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: v0.1.0
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: Windows 11 / macOS / Linux
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Start GlyphDeck
        2. ...
        3. ...
  - type: textarea
    id: logs
    attributes:
      label: Logs or Screenshots
      description: Any relevant error output or screenshots.
