name: Fuzz

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    name: Fuzz (${{ matrix.package }} / ${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: ./internal/projects
            target: FuzzNormalizePath
            fuzztime: 5m
          - package: ./internal/projects
            target: FuzzIsWindowsNetworkPath
            fuzztime: 5m
          - package: ./internal/projects
            target: FuzzDetectGit
            fuzztime: 5m
          - package: ./internal/terminal
            target: FuzzPathIsDescendant
            fuzztime: 5m
          - package: ./internal/auth
            target: FuzzCookieSecurity
            fuzztime: 5m
          - package: ./internal/auth
            target: FuzzIsLoopbackRequest
            fuzztime: 5m

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run fuzz target
        run: |
          mkdir -p fuzz-crashes
          go test ${{ matrix.package }} -run "^$" -fuzz ^${{ matrix.target }}$ -fuzztime ${{ matrix.fuzztime }} -parallel 4 || true
        continue-on-error: true

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-crashes-${{ matrix.package }}-${{ matrix.target }}
          path: fuzz-crashes/
          retention-days: 7
