name: Contributor Terms

on:
  pull_request:
    branches: [master]
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Contributor Terms
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Verify contributor terms accepted
        run: |
          if [ ! -f ".github/pull_request_template.md" ]; then
            echo "Pull request template not found"
            exit 1
          fi

          BODY="${{ github.event.pull_request.body }}"

          if echo "$BODY" | grep -q '\- \[[xX]\] I have read and agree to the GlyphDeck Contributor Terms'; then
            echo "Contributor terms accepted"
          else
            echo "ERROR: Contributor terms declaration is missing or unchecked."
            echo "Please check the box in the PR description:"
            echo "- [ ] I have read and agree to the GlyphDeck Contributor Terms and confirm that I am authorized to submit this contribution."
            exit 1
          fi
