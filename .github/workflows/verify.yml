name: Verify

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: web

      - name: Run frontend tests
        run: npm test
        working-directory: web

      - name: Build frontend
        run: npm run build
        working-directory: web

      - name: Go mod verify
        run: go mod verify

      - name: Check Go formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Unformatted Go files found. Run gofmt."
            exit 1
          fi

      - name: Run Go tests
        run: go test ./... -count=1

      - name: Run Go vet
        run: go vet ./cmd/... ./internal/... ./web/...

      - name: Build release binary
        run: go build -o dist/glyphdeck ./cmd/glyphdeck

  security:
    name: Security
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: web

      - name: Run npm audit
        run: npm audit --audit-level=high
        working-directory: web

      - name: Build frontend
        run: npm run build
        working-directory: web

      - name: Run Go race tests
        run: go test -race ./... -count=1

      - name: Install govulncheck
        run: |
          GOBIN=$PWD/tools go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck
        run: $PWD/tools/govulncheck ./... || true

  platform:
    name: Platform (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: web
        shell: bash

      - name: Build frontend
        run: npm run build
        working-directory: web
        shell: bash

      - name: Run Go tests
        run: go test ./... -count=1
        shell: bash

      - name: Build native binary
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            go build -o dist/glyphdeck.exe ./cmd/glyphdeck
          else
            go build -o dist/glyphdeck ./cmd/glyphdeck
          fi
        shell: bash
