name: Verify

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: web

      - name: Run frontend tests
        run: npm test
        working-directory: web

      - name: Build frontend
        run: npm run build
        working-directory: web

      - name: Run Go tests
        run: go test ./... -count=1

      - name: Run Go vet
        run: go vet ./cmd/... ./internal/... ./web/...

      - name: Build release binary
        run: go build -o dist/glyphdeck ./cmd/glyphdeck
