name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: web

      - name: Build frontend
        run: npm run build
        working-directory: web

      - name: Run Go tests
        run: go test ./... -count=1

      - name: Run Go vet
        run: go vet ./cmd/... ./internal/... ./web/...

  build:
    name: Build
    needs: [validate]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: npm ci && npm run build
        working-directory: web

      - name: Build release binaries
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -o dist/glyphdeck-linux-amd64 ./cmd/glyphdeck
          GOOS=darwin GOARCH=amd64 go build -o dist/glyphdeck-darwin-amd64 ./cmd/glyphdeck
          GOOS=darwin GOARCH=arm64 go build -o dist/glyphdeck-darwin-arm64 ./cmd/glyphdeck
          GOOS=windows GOARCH=amd64 go build -o dist/glyphdeck-windows-amd64.exe ./cmd/glyphdeck

      - name: Generate checksums
        run: |
          cd dist
          sha256sum glyphdeck-* > checksums.txt

      - name: Generate SBOM
        run: |
          go install github.com/CycloneDX/cyclonedx-gomod@v1.10.0
          $(go env GOPATH)/bin/cyclonedx-gomod app -json -licenses -output dist/cyclonedx-sbom.json -main cmd/glyphdeck

      - name: Attest release binaries
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: dist/*
          predicate-type: "https://slsa.dev/provenance/v1"

      - name: Create Release
        uses: softprops/action-gh-release@2bb465e97f322d3cb2a965294d483e0d26a67aa9 # v3.0.1
        with:
          files: |
            dist/*
            dist/cyclonedx-sbom.json
          generate_release_notes: true
