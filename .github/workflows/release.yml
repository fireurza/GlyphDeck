name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: web

      - name: Build frontend
        run: npm run build
        working-directory: web

      - name: Build release binaries
        run: |
          GOOS=linux GOARCH=amd64 go build -o dist/glyphdeck-linux-amd64 ./cmd/glyphdeck
          GOOS=darwin GOARCH=amd64 go build -o dist/glyphdeck-darwin-amd64 ./cmd/glyphdeck
          GOOS=darwin GOARCH=arm64 go build -o dist/glyphdeck-darwin-arm64 ./cmd/glyphdeck
          GOOS=windows GOARCH=amd64 go build -o dist/glyphdeck-windows-amd64.exe ./cmd/glyphdeck

      - name: Generate checksums
        run: |
          cd dist
          sha256sum glyphdeck-* > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
