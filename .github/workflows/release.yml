name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: web

      - name: Build frontend
        run: npm run build
        working-directory: web

      - name: Run Go tests
        run: go test ./... -count=1

      - name: Run Go vet
        run: go vet ./cmd/... ./internal/... ./web/...

  build:
    name: Build
    needs: [validate]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: npm ci && npm run build
        working-directory: web

      - name: Build release binaries
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -o dist/glyphdeck-linux-amd64 ./cmd/glyphdeck
          GOOS=darwin GOARCH=amd64 go build -o dist/glyphdeck-darwin-amd64 ./cmd/glyphdeck
          GOOS=darwin GOARCH=arm64 go build -o dist/glyphdeck-darwin-arm64 ./cmd/glyphdeck
          GOOS=windows GOARCH=amd64 go build -o dist/glyphdeck-windows-amd64.exe ./cmd/glyphdeck

      - name: Generate checksums
        run: |
          cd dist
          sha256sum \
            glyphdeck-linux-amd64 \
            glyphdeck-darwin-amd64 \
            glyphdeck-darwin-arm64 \
            glyphdeck-windows-amd64.exe \
            > checksums.txt
          cat checksums.txt

      - name: Generate SBOM
        uses: CycloneDX/gh-gomod-generate-sbom@efb74210fb404f88c57e22b9ba6a69f2a969b1ee # v2.0.0
        with:
          version: v1
          args: mod -licenses -json -output "dist/glyphdeck-${{ github.ref_name }}.cdx.json"

      - name: Attest provenance for release binaries
        id: attest-provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-checksums: dist/checksums.txt

      - name: Copy provenance bundle
        run: |
          BUNDLE="${{ steps.attest-provenance.outputs.bundle-path }}"
          if [ ! -f "$BUNDLE" ] || [ ! -s "$BUNDLE" ]; then
            echo "Provenance bundle is missing or empty"
            exit 1
          fi
          cp "$BUNDLE" "dist/glyphdeck-${{ github.ref_name }}.provenance.sigstore.json"

      - name: Attest SBOM for release binaries
        id: attest-sbom
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-checksums: dist/checksums.txt
          sbom-path: "dist/glyphdeck-${{ github.ref_name }}.cdx.json"

      - name: Copy SBOM bundle
        run: |
          BUNDLE="${{ steps.attest-sbom.outputs.bundle-path }}"
          if [ ! -f "$BUNDLE" ] || [ ! -s "$BUNDLE" ]; then
            echo "SBOM bundle is missing or empty"
            exit 1
          fi
          cp "$BUNDLE" "dist/glyphdeck-${{ github.ref_name }}.sbom.sigstore.json"

      - name: Create Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            dist/*
          generate_release_notes: true
